<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>US Commodity Tracker | Live Gold, Silver, Crude Oil & More</title>
    <meta
      name="description"
      content="Track real-time benchmark commodity prices in USD with quick unit conversions. Gold, Silver, Platinum, Crude Oil, Natural Gas, Copper, Aluminium, Zinc, Nickel & Lead."
    />
    <meta name="robots" content="index, follow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  </head>
  <body>
    <div class="ambient-orb ambient-orb-1"></div>
    <div class="ambient-orb ambient-orb-2"></div>

    <div class="wrap">
      <header>
        <div class="header-left">
          <div class="header-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="20" x2="18" y2="10" />
              <line x1="12" y1="20" x2="12" y2="4" />
              <line x1="6" y1="20" x2="6" y2="14" />
            </svg>
          </div>
          <div>
            <h1 class="h-title">US Commodity Tracker</h1>
            <p class="h-sub">Live Prices · USD Benchmarks · Unit Conversions</p>
          </div>
          <div class="logo-glow"></div>
        </div>

        <div class="h-right">
          <div style="display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap">
            <div class="status-pill" id="status-pill">
              <div class="status-dot"></div>
              <span id="status-text">CONNECTING</span>
            </div>
            <button class="hdr-btn" id="refresh-btn" onclick="forceRefresh()">
              <span style="display:inline-flex;width:14px;height:14px">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="23 4 23 10 17 10" />
                  <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                </svg>
              </span>
              Refresh
            </button>
          </div>
        </div>
      </header>

      <div class="category-tabs" id="category-tabs">
        <button class="cat-tab active" data-cat="all" onclick="filterCategory('all')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M2 12h20" />
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
          </svg>
          All
        </button>
        <button class="cat-tab" data-cat="precious" onclick="filterCategory('precious')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3l1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275z" />
          </svg>
          Precious Metals
        </button>
        <button class="cat-tab" data-cat="industrial" onclick="filterCategory('industrial')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
          </svg>
          Industrial Metals
        </button>
        <button class="cat-tab" data-cat="energy" onclick="filterCategory('energy')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
          Energy
        </button>
      </div>

      <div class="commodity-grid" id="commodity-grid"></div>

      <div class="chart-modal-overlay" id="chart-modal" style="display:none" onclick="if(event.target===this)closeChart()">
        <div class="chart-modal">
          <div class="chart-modal-header">
            <div>
              <div class="chart-modal-title" id="chart-title">Gold — Historical</div>
              <div class="chart-modal-sub" id="chart-sub">GC=F · Yahoo Finance</div>
              <div class="chart-modal-hint" id="chart-hint" style="display:none;font-size:12px;opacity:0.85;margin-top:6px"></div>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              <div class="chart-timeframe-tabs" id="chart-timeframes">
                <button class="tf-btn" data-range="1mo" onclick="changeRange('1mo')">1M</button>
                <button class="tf-btn" data-range="3mo" onclick="changeRange('3mo')">3M</button>
                <button class="tf-btn" data-range="6mo" onclick="changeRange('6mo')">6M</button>
                <button class="tf-btn active" data-range="1y" onclick="changeRange('1y')">1Y</button>
                <button class="tf-btn" data-range="5y" onclick="changeRange('5y')">5Y</button>
                <button class="tf-btn" data-range="10y" onclick="changeRange('10y')">10Y</button>
                <button class="tf-btn" data-range="max" onclick="changeRange('max')">Max</button>
              </div>
              <button class="chart-close-btn" onclick="closeChart()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">
                  <line x1="18" y1="6" x2="6" y2="18" />
                  <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
              </button>
            </div>
          </div>
          <div class="chart-container" id="chart-container"></div>
          <div class="chart-footer">
            <span>Data: Yahoo Finance (public endpoints) · For illustrative purposes only</span>
            <span id="chart-data-range"></span>
          </div>
        </div>
      </div>

      <footer class="app-footer">
        <p>Data for illustrative purposes only · Not financial advice</p>
      </footer>
    </div>

    <script>
      (function () {
        try {
          var t = localStorage.getItem('alrusco-theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
    <script src="app.js"></script>
  </body>
</html>
